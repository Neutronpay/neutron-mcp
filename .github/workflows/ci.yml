name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Smoke test — verify binary exists and help works
        run: |
          node dist/index.js --help 2>&1 | head -5 || true
          echo "Build output files:"
          ls dist/

      - name: Smoke test — verify all tools exported
        run: |
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('dist/index.js', 'utf8');
          const toolMatches = content.match(/name: ['\"]([\w_]+)['\"],/g) || [];
          console.log('Tools found:', toolMatches.length);
          if (toolMatches.length < 15) {
            console.error('ERROR: Expected at least 15 tools, found ' + toolMatches.length);
            process.exit(1);
          }
          console.log('Tool count OK');
          "

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && startsWith(github.event.head_commit.message, 'release:')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify on publish
        if: success()
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Published neutron-mcp@$VERSION"
